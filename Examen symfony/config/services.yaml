services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Liaison de l'interface vers l'implementation concrete
    App\Service\IEmployeService:
        class: App\Service\EmployeService
